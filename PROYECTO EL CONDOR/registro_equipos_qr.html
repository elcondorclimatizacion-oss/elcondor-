<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soporte Técnico - El Cóndor</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --whatsapp: #25D366; --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); padding: 1rem; margin: 0; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; margin-top: 2rem; }
        .panel { display: none; background: var(--card); border-radius: 24px; padding: 2rem; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }
        .btn { border: none; border-radius: 12px; padding: 1rem; font-weight: 800; cursor: pointer; transition: 0.3s; width: 100%; }
        input, select, textarea { width: 100%; padding: 1rem; margin-top: 0.8rem; background: #000; color: white; border: 1px solid #444; border-radius: 12px; font-family: 'JetBrains Mono', monospace; }

        /* Estilo exclusivo Ficha Cliente */
        #clientFicha { border: 2px solid var(--accent); }
        .data-label { font-size: 0.7rem; color: var(--accent); text-transform: uppercase; display: block; margin-top: 1.5rem; }
        .data-value { font-family: 'JetBrains Mono', monospace; font-size: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
        .btn-wpp { background: var(--whatsapp); color: white; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 2rem; }
    </style>
</head>
<body>

    <div class="container">
        <!-- 1. LOGIN -->
        <div id="view_login" class="panel" style="display: block; text-align: center;">
            <img src="logocondor.jpeg" width="100" style="border-radius: 50%; margin-bottom: 1.5rem; border: 3px solid var(--accent);">
            <h2>ACCESO PRIVADO</h2>
            <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 2rem;">Solo para personal técnico de El Cóndor.</p>
            <input type="password" id="pin_input" placeholder="Ingrese PIN Técnico">
            <button class="btn" style="background: var(--accent); color: #000; margin-top: 1rem;" onclick="validate()">ENTRAR AL PANEL</button>
        </div>

        <!-- 2. ADMIN PANEL (CARGA) -->
        <div id="view_admin" class="panel">
            <h2 style="color: var(--accent);">NUEVO REGISTRO DE EQUIPO</h2>
            
            <input type="text" id="in_cli" placeholder="Nombre del Cliente">
            <input type="text" id="in_dir" placeholder="Dirección del Cliente">
            <input type="text" id="in_eq" placeholder="Equipo / Modelo (Ej: Split BGH 3000fg)">
            <textarea id="in_dt" placeholder="Detalle del trabajo realizado"></textarea>
            <textarea id="in_obs" placeholder="Observaciones o Notas adicionales"></textarea>
            
            <select id="in_nx">
                <option value="6 Meses">Próximo Service en 6 meses</option>
                <option value="1 Año">Próximo Service en 1 año</option>
                <option value="Sin fecha">Sin fecha programada</option>
            </select>
            
            <button class="btn" style="background: var(--accent); color: #000; margin-top: 2rem;" onclick="generate()">GENERAR QR INTERACTIVO</button>
            
            <div id="qr_result" style="display: none; text-align: center; margin-top: 2rem; background: white; padding: 1rem; border-radius: 15px;">
                <div id="status_sheets" style="color: #65a30d; font-size: 0.8rem; font-weight: bold; margin-bottom: 10px;"></div>
                <img id="qr_img" src="">
                <p id="qr_url_txt" style="color: #000; font-size: 10px; word-break: break-all; margin-top: 10px;"></p>
                <div style="display: flex; gap: 10px; margin-top: 15px; margin-bottom: 15px;">
                    <button class="btn" style="background: #0284c7; color: #fff; padding: 0.6rem; font-size: 0.8rem;" onclick="copyLink()">COPIAR ENLACE</button>
                    <button class="btn" style="background: #0f766e; color: #fff; padding: 0.6rem; font-size: 0.8rem;" onclick="downloadQR()">DESCARGAR QR</button>
                </div>
                <button class="btn" style="background: #000; color: #fff; margin-top: 1rem;" onclick="location.reload()">NUEVA CARGA</button>
            </div>
        </div>

        <!-- 3. CLIENTE (VISTA QR) -->
        <div id="view_client" class="panel">
            <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem;">
                <img src="logocondor.jpeg" width="50" style="border-radius: 50%;">
                <div>
                    <h3 style="margin: 0;">EL CÓNDOR</h3>
                    <p style="margin: 0; font-size: 0.7rem; color: var(--accent);">HISTORIAL TÉCNICO DIGITAL</p>
                </div>
            </div>

            <span class="data-label">Cliente</span>
            <div class="data-value" id="out_cli">---</div>

            <span class="data-label">Dirección</span>
            <div class="data-value" id="out_dir">---</div>

            <span class="data-label">Equipo</span>
            <div class="data-value" id="out_eq">---</div>

            <span class="data-label">Trabajo Realizado</span>
            <div id="out_dt" style="font-size: 0.9rem; margin-top: 0.5rem; background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 8px;">---</div>

            <span class="data-label">Observaciones</span>
            <div id="out_obs" style="font-size: 0.9rem; margin-top: 0.5rem; background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 8px;">---</div>

            <span class="data-label">Próximo Mantenimiento</span>
            <div class="data-value" id="out_nx" style="color: var(--accent); border: none;">---</div>

            <a href="#" id="link_wpp" class="btn btn-wpp">SOLICITAR SERVICE</a>
            
            <p style="text-align: center; font-size: 0.6rem; color: #64748b; margin-top: 2rem;">ID de Seguimiento: <span id="out_id">---</span></p>
        </div>
    </div>

    <script>
        const PIN = "1234";
        const GHP_URL = "https://elcondorclimatizacion-oss.github.io/elcondor-/registro_equipos_qr.html";
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyxxwocEZ4NzwyAAvnCutx1P_8J0LMh2AfV2ChOXjLUJVyfp0hOr1-DhhjGVg2g1TvOrg/exec";

        window.onload = function() {
            const p = new URLSearchParams(window.location.search);
            if (p.has('id')) {
                // MODO CLIENTE: Ocultar todo y mostrar ficha
                document.getElementById('view_login').style.display = 'none';
                document.getElementById('view_admin').style.display = 'none';
                document.getElementById('view_client').style.display = 'block';

                document.getElementById('out_cli').innerText = p.get('cli') || '---';
                document.getElementById('out_dir').innerText = p.get('dir') || '---';
                document.getElementById('out_eq').innerText = p.get('eq') || '---';
                document.getElementById('out_dt').innerText = p.get('dt') || '---';
                document.getElementById('out_obs').innerText = p.get('obs') || '---';
                document.getElementById('out_nx').innerText = p.get('nx') || '---';
                document.getElementById('out_id').innerText = p.get('id') || '---';

                const msg = `Hola El Cóndor, solicito service para ID: ${p.get('id')} (${p.get('eq')}) en la dirección ${p.get('dir') || ''}. Cliente: ${p.get('cli') || ''}.`;
                document.getElementById('link_wpp').href = `https://wa.me/5491126139527?text=${encodeURIComponent(msg)}`;
            }
        }

        function validate() {
            if (document.getElementById('pin_input').value === PIN) {
                document.getElementById('view_login').style.display = 'none';
                document.getElementById('view_admin').style.display = 'block';
            } else { alert("PIN Incorrecto"); }
        }

        function generate() {
            const id = "EC-" + Math.floor(Math.random()*9000 + 1000);
            const cli = document.getElementById('in_cli').value.trim();
            const dir = document.getElementById('in_dir').value.trim();
            const eq = document.getElementById('in_eq').value.trim();
            const dt = document.getElementById('in_dt').value.trim();
            const obs = document.getElementById('in_obs').value.trim();
            const nx = document.getElementById('in_nx').value;

            if (!eq || !dt) {
                alert("Por favor ingresa al menos el Equipo/Modelo y el Detalle del Trabajo.");
                return;
            }

            const final = `${GHP_URL}?id=${id}&cli=${encodeURIComponent(cli)}&dir=${encodeURIComponent(dir)}&eq=${encodeURIComponent(eq)}&dt=${encodeURIComponent(dt)}&obs=${encodeURIComponent(obs)}&nx=${encodeURIComponent(nx)}`;
            
            // Mostrar estado de conexión con Google Sheets
            const statusSheets = document.getElementById('status_sheets');
            statusSheets.innerText = "Guardando en Google Sheets...";
            statusSheets.style.color = "#d97706";

            // Datos para registrar
            const datos = {
                action: "registrar_equipo",
                id: id,
                cliente: cli,
                direccion: dir,
                equipo: eq,
                trabajo: dt,
                observacion: obs,
                proximo_service: nx,
                fecha: new Date().toLocaleDateString()
            };

            // Enviar a Google Sheets (usando no-cors para evitar bloqueos)
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(datos)
            }).then(() => {
                statusSheets.innerText = "✅ Guardado en Google Sheets!";
                statusSheets.style.color = "#65a30d";
            }).catch(err => {
                statusSheets.innerText = "⚠️ Error al guardar en Sheets. El QR fue generado igual.";
                statusSheets.style.color = "#dc2626";
            });

            document.getElementById('qr_result').style.display = 'block';
            document.getElementById('qr_img').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(final)}`;
            document.getElementById('qr_url_txt').innerText = final;
        }

        function copyLink() {
            const url = document.getElementById('qr_url_txt').innerText;
            navigator.clipboard.writeText(url).then(() => {
                alert("¡Enlace copiado al portapapeles!");
            }).catch(err => {
                alert("Error al copiar enlace: " + err);
            });
        }

        function downloadQR() {
            const img = document.getElementById('qr_img');
            const eqName = document.getElementById('in_eq').value || 'Equipo';
            
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const tempImg = new Image();
            tempImg.crossOrigin = "anonymous";
            tempImg.src = img.src;
            tempImg.onload = function() {
                canvas.width = tempImg.width;
                canvas.height = tempImg.height;
                ctx.drawImage(tempImg, 0, 0);
                
                canvas.toBlob(function(blob) {
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `QR_${eqName.replace(/[^a-z0-9]/gi, '_').toLowerCase()}.png`;
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    window.URL.revokeObjectURL(url);
                }, 'image/png');
            };
            tempImg.onerror = function() {
                alert("No se pudo descargar automáticamente. Mantén presionada la imagen del QR para guardarla en tu galería.");
            };
        }
    </script>
</body>
</html>

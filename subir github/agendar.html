<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar Tarea - El Cóndor</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0b141a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 400px;
            background: #111b21;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }
        h2 { color: #00a884; margin-bottom: 20px; font-size: 1.2rem; }
        input, textarea, select {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: none;
            background: #202c33;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #00a884;
            color: #111b21;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .status { margin-top: 15px; font-size: 0.8rem; color: #8696a0; }
    </style>
</head>
<body>
    <div class="container">
        <img src="logocondor.jpeg" style="width: 60px; border-radius: 50%; margin-bottom: 10px;">
        <h2>NUEVA TAREA</h2>
        <input type="text" id="tarea" placeholder="¿Qué hay que hacer?" required>
        <input type="text" id="lugar" placeholder="¿Dónde? (Lugar/Cliente)">
        <select id="urgencia">
            <option value="Baja">Baja</option>
            <option value="Media" selected>Media</option>
            <option value="Alta">ALTA 🔥</option>
        </select>
        <button id="btnEnviar" onclick="enviarTarea()">AGENDAR EN LA NUBE</button>
        <div id="status" class="status">Conectado directamente a Google Sheets.</div>
    </div>

    <script>
        async function enviarTarea() {
            const tarea = document.getElementById('tarea').value;
            const lugar = document.getElementById('lugar').value;
            const urgencia = document.getElementById('urgencia').value;
            const status = document.getElementById('status');
            const btn = document.getElementById('btnEnviar');

            if (!tarea) return alert("Escribí la tarea.");

            status.innerText = "Sincronizando...";
            btn.disabled = true;
            btn.style.opacity = "0.5";

            const scriptUrl = "https://script.google.com/macros/s/AKfycbyxxwocEZ4NzwyAAvnCutx1P_8J0LMh2AfV2ChOXjLUJVyfp0hOr1-DhhjGVg2g1TvOrg/exec";
            
            const datos = { tarea, lugar, urgencia };

            try {
                // Usamos el modo 'no-cors' para Apps Script o simplemente manejamos la redirección
                fetch(scriptUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                }).then(() => {
                    status.innerText = "✅ ¡Agendado en Google Sheets!";
                    document.getElementById('tarea').value = "";
                    document.getElementById('lugar').value = "";
                    btn.disabled = false;
                    btn.style.opacity = "1";
                });
            } catch (error) {
                status.innerText = "❌ Error al conectar.";
                btn.disabled = false;
                btn.style.opacity = "1";
            }
        }
    </script>
</body>
</html>
